name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # XML fixtures under tests/fixtures/ are anonymized (account=U0000000);
        # the suite does NOT hit live Flex — see ADR-002.
        run: pytest -q

  lint-line-endings:
    # Windows-only scripts (.bat / .cmd / .ps1) MUST be CRLF — cmd.exe and
    # PowerShell mis-parse LF-only files under codepage 936 (see
    # .gitattributes BUG-001). POSIX shell scripts (.sh) MUST be LF —
    # bash chokes on the CRLF in the shebang line. This job guards both.
    name: line endings (CRLF for Windows, LF for *.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check *.bat / *.cmd / *.ps1 are CRLF
        run: |
          failed=0
          for f in $(git ls-files '*.bat' '*.cmd' '*.ps1'); do
            if file "$f" | grep -q "CRLF line terminators"; then
              echo "  OK CRLF: $f"
            else
              echo "  FAIL LF: $f  (cmd.exe / PowerShell will mis-parse)"
              failed=1
            fi
          done
          exit $failed

      - name: Check *.sh are LF
        run: |
          failed=0
          for f in $(git ls-files '*.sh'); do
            if file "$f" | grep -q "CRLF line terminators"; then
              echo "  FAIL CRLF: $f  (bash chokes on the shebang)"
              failed=1
            else
              echo "  OK LF: $f"
            fi
          done
          exit $failed
